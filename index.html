  <script>
    (function() {
      var API = location.hostname === 'localhost' ? '/api/now-playing' : 'https://vnx054jquf.execute-api.us-east-2.amazonaws.com/now-playing';
      var PROFILE = 'images/kylekrukar.jpg';
      var root = document.documentElement.style;
      var bgA = document.getElementById('albumBg');
      var bgB = document.getElementById('albumBgNext');
      var np = document.getElementById('nowPlaying');
      var npInner = np.querySelector('.now-playing-inner');
      var npTrack = document.getElementById('npTrack');
      var npArtist = document.getElementById('npArtist');
      var activeBg = 0, curTrack = '', crossfadeId = 0;

      function safeUrl(url) {
        try { return new URL(url).protocol === 'https:' ? url : ''; }
        catch(e) { return ''; }
      }

      var canvas = document.createElement('canvas');
      canvas.width = canvas.height = 64;
      var ctx2d = canvas.getContext('2d');

      // Color utilities
      function toHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        var mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
        var h = 0, s = 0, l = (mx + mn) / 2;
        if (d) {
          s = l > .5 ? d / (2 - mx - mn) : d / (mx + mn);
          h = mx === r ? ((g - b) / d + (g < b ? 6 : 0)) / 6
            : mx === g ? ((b - r) / d + 2) / 6
            : ((r - g) / d + 4) / 6;
        }
        return [h * 360, s, l];
      }

      function fromHsl(h, s, l) {
        h /= 360;
        if (!s) { var v = Math.round(l * 255); return [v, v, v]; }
        var q = l < .5 ? l * (1 + s) : l + s - l * s, p = 2 * l - q;
        function c(t) {
          t = ((t % 1) + 1) % 1;
          return Math.round((t < 1/6 ? p + (q - p) * 6 * t : t < .5 ? q : t < 2/3 ? p + (q - p) * (2/3 - t) * 6 : p) * 255);
        }
        return [c(h + 1/3), c(h), c(h - 1/3)];
      }

      function lum(r, g, b) {
        function f(c) { c /= 255; return c <= .03928 ? c / 12.92 : Math.pow((c + .055) / 1.055, 2.4); }
        return .2126 * f(r) + .7152 * f(g) + .0722 * f(b);
      }

      function cr(a, b) { return (Math.max(a, b) + .05) / (Math.min(a, b) + .05); }

      function rgb(c) { return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }

      function clamp(v) { return Math.min(1, Math.max(0, v)); }

      // Extract vibrant text color from album art
      function pickColor(url) {
        return new Promise(function(resolve) {
          var img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function() {
            ctx2d.drawImage(img, 0, 0, 64, 64);
            var d = ctx2d.getImageData(0, 0, 64, 64).data;
            var tR = 0, tG = 0, tB = 0, n = 4096;
            var best = null, bestS = 0;

            for (var i = 0; i < d.length; i += 4) {
              var r = d[i], g = d[i+1], b = d[i+2];
              tR += r; tG += g; tB += b;
            }

            // Adjusted bg luminance (CSS brightness .85 + vignette ~.72x)
            var bgL = lum(Math.round(tR / n * .72), Math.round(tG / n * .72), Math.round(tB / n * .72));
            var dark = bgL < .35;

            // Sample every 4th pixel for vibrant candidates
            for (var i = 0; i < d.length; i += 16) {
              var r = d[i], g = d[i+1], b = d[i+2];
              var hsl = toHsl(r, g, b);
              if (hsl[1] > .3 && hsl[2] > .15 && hsl[2] < .85) {
                var cLum = lum(r, g, b);
                var ratio = cr(cLum, bgL);
                var score = ratio * 3 + hsl[1] * 2;
                if (score > bestS && ratio >= 3) { bestS = score; best = [r, g, b]; }
              }
            }

            if (best) {
              var h = toHsl(best[0], best[1], best[2]);
              h[1] = clamp(h[1] * 1.4);
              h[2] = dark ? Math.max(h[2], .65) : Math.min(h[2], .35);
              // Ensure WCAG AA contrast
              for (var s = 0; s < 20; s++) {
                best = fromHsl(h[0], h[1], h[2]);
                if (cr(lum(best[0], best[1], best[2]), bgL) >= 4.5) break;
                h[2] = clamp(h[2] + (dark ? .05 : -.05));
              }
            } else {
              best = dark ? [240, 240, 245] : [30, 30, 35];
            }

            resolve(best);
          };
          img.onerror = function() { resolve(null); };
          img.src = url;
        });
      }

      function applyColors(c) {
        root.setProperty('--album-text', rgb(c));
        var h = toHsl(c[0], c[1], c[2]);
        var hL = h[2] > .5 ? clamp(h[2] + .15) : clamp(h[2] - .15);
        root.setProperty('--album-text-hover', rgb(fromHsl(h[0], clamp(h[1] * 1.2), hL)));
      }

      // Background crossfade (cancels stale loads via monotonic id)
      function crossfade(url) {
        var id = ++crossfadeId;
        var img = new Image();
        img.onload = function() {
          if (id !== crossfadeId) return; // a newer crossfade was started; discard
          var cur = activeBg ? bgB : bgA;
          var nxt = activeBg ? bgA : bgB;
          nxt.style.opacity = '0';
          nxt.style.backgroundImage = 'url(' + url + ')';
          void nxt.offsetHeight;
          nxt.style.opacity = '1';
          cur.style.opacity = '0';
          activeBg = 1 - activeBg;
        };
        img.src = url;
      }

      // Widget
      function showWidget(data) {
        if (np.classList.contains('visible') && curTrack) {
          npInner.style.opacity = '0';
          setTimeout(function() {
            npTrack.textContent = data.track;
            npArtist.textContent = data.artist;
            npInner.style.opacity = '1';
          }, 300);
        } else {
          npTrack.textContent = data.track;
          npArtist.textContent = data.artist;
          np.classList.add('visible');
        }
      }

      // Clear album art and return to aurora
      function clearBg() {
        bgA.style.opacity = '0';
        bgB.style.opacity = '0';
        np.classList.remove('visible');
        curTrack = '';
        root.removeProperty('--album-text');
        root.removeProperty('--album-text-hover');
      }

      // Poll Spotify
      function poll() {
        fetch(API).then(function(r) { return r.json(); }).then(function(data) {
          if (!data.is_playing || !data.track) {
            if (curTrack) clearBg();
            return;
          }
          if (data.track === curTrack) return;

          var art = safeUrl(data.album_art);
          if (art) {
            crossfade(art);
            pickColor(art).then(function(c) { if (c) applyColors(c); });
          }
          showWidget(data);
          curTrack = data.track;
        }).catch(function() {});
      }

      // Initial load: check Spotify first, fall back to profile bg if not playing
      fetch(API).then(function(r) { return r.json(); }).then(function(data) {
        var initArt = data.is_playing && data.track && safeUrl(data.album_art);
        if (initArt) {
          bgA.style.backgroundImage = 'url(' + initArt + ')';
          bgA.style.opacity = '1';
          pickColor(initArt).then(function(c) { if (c) applyColors(c); });
          showWidget(data);
          curTrack = data.track;
        }
      }).catch(function() {});

      setInterval(poll, 15000);
    })();
  </script>
